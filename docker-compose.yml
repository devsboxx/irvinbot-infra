services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-databases.sh:/docker-entrypoint-initdb.d/init-databases.sh
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 10

  chromadb:
    image: chromadb/chroma:latest
    environment:
      ANONYMIZED_TELEMETRY: "false"
    volumes:
      - chroma_data:/chroma/chroma
    ports:
      - "8004:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/heartbeat')\" 2>/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  auth:
    build:
      context: ../irvinbot-auth
      dockerfile: Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/irvinbot_auth
    ports:
      - "8001:8001"
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure

  chat:
    build:
      context: ../irvinbot-chat
      dockerfile: Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/irvinbot_chat
      CHROMA_HOST: chromadb
      CHROMA_PORT: 8000
    ports:
      - "8002:8002"
    depends_on:
      postgres:
        condition: service_healthy
      chromadb:
        condition: service_started
    restart: on-failure

  docs:
    build:
      context: ../irvinbot-docs
      dockerfile: Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/irvinbot_docs
      CHROMA_HOST: chromadb
      CHROMA_PORT: 8000
      UPLOAD_DIR: /data/uploads
    volumes:
      - uploads_data:/data/uploads
    ports:
      - "8003:8003"
    depends_on:
      postgres:
        condition: service_healthy
      chromadb:
        condition: service_started
    restart: on-failure

  gateway:
    build:
      context: ../irvinbot-gateway
      dockerfile: Dockerfile
    env_file: .env
    environment:
      AUTH_SERVICE_URL: http://auth:8001
      CHAT_SERVICE_URL: http://chat:8002
      DOCS_SERVICE_URL: http://docs:8003
    ports:
      - "8000:8000"
    depends_on:
      - auth
      - chat
      - docs
    restart: on-failure

volumes:
  postgres_data:
  chroma_data:
  uploads_data:
