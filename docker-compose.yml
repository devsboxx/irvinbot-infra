services:
  auth:
    build:
      context: ../irvinbot-auth
      dockerfile: Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
    ports:
      - "8001:8001"
    restart: on-failure

  chat:
    build:
      context: ../irvinbot-chat
      dockerfile: Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      DOCS_SERVICE_URL: http://docs:8003
    ports:
      - "8002:8002"
    depends_on:
      - docs
    restart: on-failure

  docs:
    build:
      context: ../irvinbot-docs
      dockerfile: Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      UPLOAD_DIR: /data/uploads
    volumes:
      - uploads_data:/data/uploads
    ports:
      - "8003:8003"
    restart: on-failure

  gateway:
    build:
      context: ../irvinbot-gateway
      dockerfile: Dockerfile
    env_file: .env
    environment:
      AUTH_SERVICE_URL: http://auth:8001
      CHAT_SERVICE_URL: http://chat:8002
      DOCS_SERVICE_URL: http://docs:8003
    ports:
      - "8000:8000"
    depends_on:
      - auth
      - chat
      - docs
    restart: on-failure

volumes:
  uploads_data:
